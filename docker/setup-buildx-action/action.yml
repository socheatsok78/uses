name: 'Docker Setup Buildx'
description: 'Set up Docker Buildx'
author: 'docker'
branding:
  icon: 'anchor'
  color: 'blue'

inputs:
  version:
    description: 'Buildx version. (eg. v0.3.0)'
    required: false
  driver:
    description: 'Sets the builder driver to be used'
    default: 'docker-container'
    required: false
  driver-opts:
    description: 'List of additional driver-specific options. (eg. image=moby/buildkit:master)'
    required: false
  buildkitd-flags:
    description: 'BuildKit daemon flags'
    required: false
  buildkitd-config:
    description: 'BuildKit daemon config file'
    required: false
  buildkitd-config-inline:
    description: 'Inline BuildKit daemon config'
    required: false
  use:
    description: 'Switch to this builder instance'
    default: 'true'
    required: false
  name:
    description: 'Name of the builder. If not specified, one will be generated or if it already exists, it will be used instead of creating a new one.'
    required: false
  endpoint:
    description: 'Optional address for docker socket or context from `docker context ls`'
    required: false
  platforms:
    description: 'Fixed platforms for current node. If not empty, values take priority over the detected ones'
    required: false
  append:
    description: 'Append additional nodes to the builder'
    required: false
  keep-state:
    description: 'Keep BuildKit state on cleanup. This is only useful on persistent self-hosted runners.'
    default: 'false'
    required: false
  cache-binary:
    description: 'Cache buildx binary to GitHub Actions cache backend'
    default: 'true'
    required: false
  cleanup:
    description: 'Cleanup temp files and remove builder at the end of a job'
    default: 'true'
    required: false

outputs:
  name:
    description: 'Builder name'
    value: '${{ steps.setup-buildx-action.outputs.name }}'
  driver:
    description: 'Builder driver'
    value: '${{ steps.setup-buildx-action.outputs.driver }}'
  platforms:
    description: 'Builder node platforms (preferred or available)'
    value: '${{ steps.setup-buildx-action.outputs.platforms }}'
  nodes:
    description: 'Builder nodes metadata'
    value: '${{ steps.setup-buildx-action.outputs.nodes }}'
  endpoint:
    description: 'Builder node endpoint (deprecated, use nodes output instead)'
    value: '${{ steps.setup-buildx-action.outputs.endpoint }}'
  status:
    description: 'Builder node status (deprecated, use nodes output instead)'
    value: '${{ steps.setup-buildx-action.outputs.status }}'
  flags:
    description: 'Builder node flags (deprecated, use nodes output instead)'
    value: '${{ steps.setup-buildx-action.outputs.flags }}'

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      id: setup-buildx-action
      uses: docker/setup-buildx-action@v4
      with:
        version: ${{ inputs.version }}
        driver: ${{ inputs.driver }}
        driver-opts: ${{ inputs.driver-opts }}
        buildkitd-flags: ${{ inputs.buildkitd-flags }}
        buildkitd-config: ${{ inputs.buildkitd-config }}
        buildkitd-config-inline: ${{ inputs.buildkitd-config-inline }}
        use: ${{ inputs.use }}
        name: ${{ inputs.name }}
        endpoint: ${{ inputs.endpoint }}
        platforms: ${{ inputs.platforms }}
        append: ${{ inputs.append }}
        keep-state: ${{ inputs.keep-state }}
        cache-binary: ${{ inputs.cache-binary }}
        cleanup: ${{ inputs.cleanup }}
