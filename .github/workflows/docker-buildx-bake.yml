name: Docker Buildx Bake

on:
  workflow_call:
    inputs:
      files:
        type: string
        description: 'List of bake definition files'
        required: false
        default: './docker-bake.hcl'
      targets:
        type: string
        description: 'List of bake targets'
        required: false
        default: 'default'
      images:
        type: string
        description: 'List of Docker images to use as base name for tags'
        required: false
        default: 'ghcr.io/${{ github.repository }}'
      tags:
        type: string
        description: 'List of tags as key-value pair attributes'
        required: false
        default: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=ref,event=branch
          type=sha
      permit-login:
        type: boolean
        default: false
        description: 'Permit login to container registry'
      permit-push:
        type: boolean
        default: false
        description: 'Permit pushing built images to container registry'
      permit-cache:
        type: boolean
        default: false
        description: 'Permit using GitHub Actions cache for buildx'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.images }}
          tags: ${{ inputs.tags }}

      - name: Generate GitHub metadata
        id: github-meta
        uses: dockerbakery/github-metadata-action@v4

      - if: ${{ inputs.permit-login }}
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          targets: ${{ inputs.targets }}
          push: ${{ inputs.permit-login && inputs.permit-push }}
          files: |
            ${{ inputs.files }}
            cwd://${{ steps.docker-meta.outputs.bake-file }}
            cwd://${{ steps.github-meta.outputs.bake-file }}
          set: |
            ${{ inputs.permit-cache && '*.cache-from=type=gha' || ''}}
            ${{ inputs.permit-cache && '*.cache-to=type=gha,mode=min' || ''}}
